version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ss14_postgres
    environment:
      POSTGRES_DB: ss14_web
      POSTGRES_USER: ss14
      POSTGRES_PASSWORD: ss14_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ss14 -d ss14_web"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: