# Copy this file to appsettings.Secret.yml and fill in your values
# This file is gitignored and contains sensitive configuration

ConnectionStrings:
  DefaultConnection: "Server=localhost;Port=5432;Database=ss14_web;User Id=postgres;Password=your_password;"
  HubConnection: "Server=localhost;Port=5432;Database=ss14_web;User Id=postgres;Password=your_password;"

# IdentityServer4 signing key (required for production)
# Generate with: openssl ecparam -name prime256v1 -genkey -noout -out ecdsa.key
Is4SigningKeyPath: "C:\\path\\to\\ecdsa.key"

# OAuth Providers - uncomment and configure the ones you want to use
# You can enable ONLY VK, ONLY Yandex, or BOTH

# VKontakte (VK) OAuth
# 1. Create app at https://dev.vk.com/
# 2. Add Redirect URI: https://your-domain.com/signin-vk
# 3. Enable "Email" permission in app settings
Vkontakte:
  ClientId: "your_vk_app_id"
  ClientSecret: "your_vk_app_secret"

# Yandex OAuth
# 1. Create app at https://oauth.yandex.ru/
# 2. Add Redirect URI: https://your-domain.com/signin-yandex
# 3. Enable "Yandex ID" -> "Login, email, avatar" permissions
Yandex:
  ClientId: "your_yandex_client_id"
  ClientSecret: "your_yandex_client_secret"

# Patreon OAuth (optional)
Patreon:
  ClientId: "your_patreon_client_id"
  ClientSecret: "your_patreon_client_secret"
  TierMap: {}
  TierNames: {}

# hCaptcha (optional)
HCaptcha:
  SiteKey: "your_hcaptcha_site_key"
  SecretKey: "your_hcaptcha_secret_key"